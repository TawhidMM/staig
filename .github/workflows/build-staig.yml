name: Build and Push STAIG Image

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 🔥 NEW STEP: Convert repository name to lowercase
      - name: Prepare Image Name
        id: prep
        run: |
          REPO_LC=${GITHUB_REPOSITORY,,}
          echo "repo_lc=${REPO_LC}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Use the lowercase output from the Prepare step
          tags: ghcr.io/${{ steps.prep.outputs.repo_lc }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max