name: Build and Push STAIG Image

on:
  workflow_dispatch: # Allows you to run this manually from the GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # This names the image: ghcr.io/your-username/staig-tool:latest
          tags: ghcr.io/${{ github.repository_lowercased }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max