name: staig-env
channels:
  - nvidia
  - pytorch
  - conda-forge
  - pyg
  - nodefaults

dependencies:
  - python=3.10

  # Core numeric stack (conda builds → ABI stable in Docker)
  - numpy=1.24.3
  - pandas=2.0.1
  - scipy=1.10.1
  - h5py=3.8.0

  # PyTorch stack (match your local env)
  - pytorch=2.2.2
  - pytorch-cuda=12.1
  - torchvision=0.17.2
  - torchaudio=2.2.2

  # PyG (match your local env)
  - pyg=2.5.2

  # R stack (match your local env exactly)
  - r-base=4.2.3
  - r-mclust=5.4.10

  - pip
  - git

  - pip:
      - -r /tmp/requirements.txt
